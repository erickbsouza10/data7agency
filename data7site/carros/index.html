<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCar</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        img {
            width: 100%;
            height: 100vh;
            object-fit: cover;
        }
        /* HEADER */
        
        header {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 1s ease;
        }
        
        header.show {
            opacity: 1;
        }
        /* LEGENDA */
        
        .legenda {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: flex;
            gap: 15px;
            opacity: 0;
            transition: opacity 1s ease;
        }
        
        .legenda.show {
            opacity: 1;
        }
        
        .cor {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.4);
            transition: 0.3s;
        }
        
        .cor:hover {
            transform: scale(1.2);
        }
        
        .amarelo {
            background: yellow;
        }
        
        .branco {
            background: white;
        }
    </style>
</head>

<body>

    <img id="frame" src="assets/inicio-frames/inicio_00000.jpg">

    <!-- HEADER -->
    <header id="header">
        <h1>AutoCar</h1>
        <h2>Lançamento AutoCar</h2>
    </header>
    <div class="info-container">

        <div class="info">
            <h3>★★★★★</h3>
            <p>Avaliação</p>
        </div>

        <div class="info">
            <h3>3.0L Turbo</h3>
            <p>Motor</p>
        </div>

        <div class="info">
            <h3>382 cv</h3>
            <p>Potência</p>
        </div>

    </div>
    <!-- LEGENDA -->
    <div class="legenda" id="legenda">
        <div class="cor amarelo" onclick="setCor('amarelo')"></div>
        <div class="cor branco" onclick="setCor('branco')"></div>
    </div>

    <script>
        const totalFrames = 22;

        const elements = {
            img: document.getElementById("frame"),
            header: document.getElementById("header"),
            legenda: document.getElementById("legenda"),
            infos: document.querySelectorAll(".info")
        };

        let state = {
            frame: 0,
            animando: true
        };

        const pad = (num) => String(num).padStart(5, "0");

        function finalizarAnimacao() {
            state.animando = false;

            // Header
            elements.header.classList.add("show");

            // Cores
            setTimeout(() => {
                elements.legenda.classList.add("show");
            }, 400);

            // Infos (cards)
            setTimeout(() => {
                elements.infos.forEach(el => el.classList.add("show"));
            }, 700);
        }

        function renderFrame() {
            elements.img.src = `assets/inicio-frames/inicio_${pad(state.frame)}.jpg`;
        }

        function animate() {
            if (!state.animando) return;

            if (state.frame > totalFrames) {
                finalizarAnimacao();
                return;
            }

            renderFrame();
            state.frame++;

            setTimeout(animate, 50);
        }

        function setCor(cor) {
            state.animando = false;

            const cores = {
                branco: "inicio_00023.jpg",
                amarelo: "inicio_00022.jpg"
            };

            if (cores[cor]) {
                elements.img.src = `assets/inicio-frames/${cores[cor]}`;
            }
        }

        window.addEventListener("load", animate);
    </script>

</body>

</html>
